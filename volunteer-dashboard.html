<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FoodBridge – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-dark:  #1a3c2e; --green-mid: #2d6a4f; --green-light: #52b788;
      --green-pale:  #d8f3dc; --accent: #f4a261; --white: #ffffff;
      --off-white:   #f8faf7; --text-dark: #1a1a1a; --text-muted: #5a6a60;
      --font-head:   'Playfair Display', serif; --font-body: 'DM Sans', sans-serif;
      --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--text-dark); background: var(--off-white); overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    /* NAVBAR */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1rem 6%; background: rgba(26,60,46,0.96); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .logo { font-family: var(--font-head); font-size: 1.5rem; color: var(--white); display: flex; align-items: center; gap: 0.5rem; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.8); font-size: 0.95rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    /* PAGE HERO */
    .page-hero { padding: 9rem 6% 4rem; background: var(--green-dark); text-align: center; }
    .page-hero h1 { font-family: var(--font-head); font-size: clamp(2rem,4vw,3.2rem); color: var(--white); margin-bottom: 0.75rem; }
    .page-hero p { color: rgba(255,255,255,0.75); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

    /* DASHBOARD TABS */
    .dashboard-tabs { display: none; justify-content: center; gap: 1rem; margin-top: -1.5rem; position: relative; z-index: 10; padding-bottom: 2rem; }
    .tab-btn { background: var(--white); color: var(--green-dark); border: 2px solid var(--green-pale); padding: 0.6rem 1.5rem; border-radius: 999px; font-family: var(--font-body); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow); }
    .tab-btn.active { background: var(--green-mid); color: var(--white); border-color: var(--green-mid); }
    .tab-btn:hover:not(.active) { background: var(--green-pale); }

    /* DASHBOARD */
    .dashboard-container { padding: 2rem 6% 4rem; max-width: 1200px; margin: 0 auto; min-height: 50vh; }
    .section-view { display: none; }
    .section-view.active { display: block; }
    
    .tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid #dde8e1; padding-bottom: 1rem; }
    .tasks-header h2 { font-family: var(--font-head); color: var(--green-dark); font-size: 1.8rem; }
    .tasks-header .badge { background: var(--accent); color: var(--green-dark); padding: 0.3rem 1rem; border-radius: 999px; font-weight: 700; font-size: 0.9rem; }

    /* GRID */
    .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .task-card { background: var(--white); border: 1px solid #dde8e1; border-radius: var(--radius); padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; box-shadow: var(--shadow); transition: transform 0.2s; position: relative; overflow: hidden; }
    .task-card:hover { transform: translateY(-3px); }
    .task-card.verified { border: 2px solid #e1b12c; box-shadow: 0 4px 20px rgba(225, 177, 44, 0.2); background: linear-gradient(135deg, #ffffff 0%, #fffdf5 100%); }
    .verified-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: #fff8e1; color: #b8860b; padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; margin-bottom: 0.2rem; border: 1px solid #ffe082; width: fit-content; text-transform: uppercase; letter-spacing: 0.05em; }
    
    .task-badge { position: absolute; top: 1rem; right: 1rem; padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge-fresh { background: var(--green-pale); color: var(--green-dark); }
    .badge-leftover { background: #fff3cd; color: #856404; }
    .badge-quick { background: #e2e3e5; color: #383d41; }
    
    .task-title { font-family: var(--font-head); font-size: 1.3rem; color: var(--green-dark); padding-right: 4rem; margin-top: 1rem; }
    .task-meta { font-size: 0.88rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 0.4rem; }
    .task-meta span { display: flex; align-items: flex-start; gap: 0.5rem; }
    .task-icon { flex-shrink: 0; font-size: 1rem; }
    
    .btn-action { margin-top: auto; width: 100%; border: none; border-radius: 8px; padding: 0.8rem; font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-pickup { background: var(--green-mid); color: var(--white); }
    .btn-pickup:hover { background: var(--green-dark); }
    .btn-donate { background: var(--accent); color: var(--green-dark); }
    .btn-donate:hover { background: #e8914f; }
    .btn-verify { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-mid); }
    .btn-verify:hover { background: var(--green-mid); color: var(--white); }
    .btn-action.loading { opacity: 0.7; cursor: not-allowed; }

    /* ACCOUNTS TABLE */
    .accounts-table { width: 100%; border-collapse: collapse; background: var(--white); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .accounts-table th, .accounts-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #dde8e1; }
    .accounts-table th { background: var(--green-dark); color: var(--white); font-weight: 600; }
    .accounts-table tr:hover { background: var(--off-white); }
    .role-select { padding: 0.4rem; border-radius: 4px; border: 1px solid #ccc; font-family: var(--font-body); }
    .btn-save-role { background: var(--green-mid); color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; font-weight: 600; margin-left: 0.5rem; }
    .btn-save-role:hover { background: var(--green-dark); }

    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); grid-column: 1 / -1; }
    .empty-state div { font-size: 3rem; margin-bottom: 1rem; }
    
    @media (max-width: 720px) { .nav-links { display: none; } }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="logo">🌿 Food<span>Bridge</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="how-it-works.html">How It Works</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li id="nav-dashboard"><a href="volunteer-dashboard.html" class="active">Dashboard</a></li>
      <li id="nav-logout"><a href="#" onclick="logoutUser()" style="color:red; font-weight:700;">Logout</a></li>
    </ul>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <h1 id="hero-title">Staff Dashboard</h1>
    <p>View active requests and manage food delivery status.</p>
  </div>

  <!-- DASHBOARD TABS (Admin Only) -->
  <div class="dashboard-tabs" id="admin-tabs">
    <button class="tab-btn active" onclick="switchSection('tasks')">Manage Tasks</button>
    <button class="tab-btn" onclick="switchSection('accounts')">Manage Accounts</button>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div class="dashboard-container">
    
    <!-- TASKS SECTION -->
    <div id="section-tasks" class="section-view active">
      <div class="tasks-header">
        <h2>Active Tasks</h2>
        <span class="badge" id="task-count">0 Tasks</span>
      </div>
      <div class="task-grid" id="task-grid">
        <div class="empty-state"><div>⏳</div><p>Loading active requests...</p></div>
      </div>
    </div>

    <!-- ACCOUNTS SECTION -->
    <div id="section-accounts" class="section-view">
      <div class="tasks-header">
        <h2>System Accounts</h2>
        <span class="badge" id="account-count">0 Accounts</span>
      </div>
      <div style="overflow-x: auto;">
        <table class="accounts-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Created At</th>
              <th>Role</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="accounts-body">
            <tr><td colspan="5" style="text-align:center;">Loading accounts...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="nav-auth.js"></script>
  <script>
    const token = localStorage.getItem('fb_token');
    const role = localStorage.getItem('fb_role');

    // Security check
    if (!token || !['admin', 'volunteer'].includes(role)) {
        window.location.href = 'auth.html';
    }

    // Setup UI based on role
    if (role === 'admin') {
        document.getElementById('admin-tabs').style.display = 'flex';
        document.getElementById('hero-title').textContent = 'Admin Dashboard';
    } else {
        document.getElementById('hero-title').textContent = 'Volunteer Dashboard';
    }

    // Tab Switching
    function switchSection(section) {
        document.querySelectorAll('.section-view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`section-${section}`).classList.add('active');
        event.target.classList.add('active');
        
        if (section === 'accounts') loadAccounts();
        else loadTasks();
    }

    // --- TASKS LOGIC ---
    const taskGrid = document.getElementById('task-grid');
    
    async function loadTasks() {
        try {
            const response = await fetch('/api/tasks', { headers: { 'Authorization': 'Bearer ' + token } });
            if (response.ok) {
                const tasks = await response.json();
                document.getElementById('task-count').textContent = `${tasks.length} Task${tasks.length !== 1 ? 's' : ''}`;
                renderTasks(tasks);
            } else {
                taskGrid.innerHTML = `<div class="empty-state"><div>⚠️</div><p>Failed to load tasks.</p></div>`;
            }
        } catch (error) {
            taskGrid.innerHTML = `<div class="empty-state"><div>⚠️</div><p>Network error.</p></div>`;
        }
    }

    function renderTasks(tasks) {
        if (tasks.length === 0) {
            taskGrid.innerHTML = `<div class="empty-state"><div>🎉</div><p>No active tasks right now.</p></div>`;
            return;
        }

        taskGrid.innerHTML = tasks.map(task => {
            let badgeClass = 'badge-quick';
            let conditionDisplay = 'Quick Request';
            if (task.source === 'donation') {
                badgeClass = task.food_condition === 'Fresh' ? 'badge-fresh' : 'badge-leftover';
                conditionDisplay = task.food_condition ? `${task.food_condition} Food` : 'Donation';
            }

            let statusColor = task.status === 'Pending' ? 'gray' : (task.status === 'Picked Up' ? 'orange' : 'green');
            
            let actionBtnHtml = '';
            if (task.status === 'Pending') {
                actionBtnHtml = `<button class="btn-action btn-pickup" onclick="handleTaskAction('pickup', ${task.id}, '${task.source}', this)">Mark as Picked Up ✓</button>`;
            } else if (task.status === 'Picked Up') {
                actionBtnHtml = `<button class="btn-action btn-donate" onclick="handleTaskAction('donate', ${task.id}, '${task.source}', this)">Mark as Donated 🤝</button>`;
            } else if (task.status === 'Donated' && role === 'admin') {
                actionBtnHtml = `<button class="btn-action btn-verify" onclick="handleTaskAction('verify', ${task.id}, '${task.source}', this)">Verify Donation ✅</button>`;
            } else if (task.status === 'Donated') {
                actionBtnHtml = `<div style="text-align:center; padding:0.5rem; font-size:0.9rem; font-weight:bold; color:var(--text-muted);">Awaiting Admin Verification</div>`;
            } else if (task.status === 'Verified') {
                actionBtnHtml = `<div style="text-align:center; padding:0.5rem; font-size:0.9rem; font-weight:bold; color:var(--green-light);">🎉 Successfully Verified</div>`;
            }

            let verifiedBadge = '';
            let cardClass = 'task-card';
            if (task.is_verified_donor) {
                cardClass += ' verified';
                verifiedBadge = `<div class="verified-badge">⭐ Verified Donor</div>`;
            }

            return `
            <div class="${cardClass}" id="task-${task.id}">
                <span class="task-badge ${badgeClass}">${conditionDisplay}</span>
                <div style="position:absolute; top:2.5rem; right:1rem; font-size:0.75rem; color:${statusColor}; font-weight:bold;">● ${task.status}</div>
                ${verifiedBadge}
                <div class="task-title" style="margin-top:0;">${task.food_type}</div>
                <div class="task-meta">
                    <span><span class="task-icon">📍</span> ${escapeHtml(task.address)}</span>
                    <span><span class="task-icon">👤</span> ${escapeHtml(task.name)} (${escapeHtml(task.phone)})</span>
                    ${task.quantity ? `<span><span class="task-icon">📦</span> ${escapeHtml(task.quantity)} kg</span>` : ''}
                    ${task.ngo_name ? `<span><span class="task-icon">🏢</span> Donated to: ${escapeHtml(task.ngo_name)}</span>` : ''}
                </div>
                ${actionBtnHtml}
            </div>
            `;
        }).join('');
    }

    async function handleTaskAction(action, id, source, btnElement) {
        let payload = { id, source };
        
        if (action === 'donate') {
            const ngo = prompt("Enter the name of the NGO where food was donated:");
            if (!ngo || !ngo.trim()) { alert("NGO name is required!"); return; }
            payload.ngo_name = ngo.trim();
        }

        btnElement.classList.add('loading');
        btnElement.disabled = true;

        try {
            const response = await fetch(`/api/tasks/${action}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // visual feedback
                const data = await response.json();
                loadTasks(); // refresh board
            } else {
                const err = await response.json();
                alert('Action failed: ' + err.error);
                btnElement.classList.remove('loading');
                btnElement.disabled = false;
            }
        } catch (err) {
            alert('Network error.');
            btnElement.classList.remove('loading');
            btnElement.disabled = false;
        }
    }

    // --- ACCOUNTS LOGIC (Admin Only) ---
    async function loadAccounts() {
        if (role !== 'admin') return;
        const tbody = document.getElementById('accounts-body');
        try {
            const response = await fetch('/api/accounts', { headers: { 'Authorization': 'Bearer ' + token } });
            if (response.ok) {
                const accounts = await response.json();
                document.getElementById('account-count').textContent = `${accounts.length} Account${accounts.length !== 1 ? 's' : ''}`;
                tbody.innerHTML = accounts.map(acc => `
                    <tr>
                        <td>${acc.id}</td>
                        <td><strong>${escapeHtml(acc.username)}</strong></td>
                        <td>${new Date(acc.created_at).toLocaleDateString()}</td>
                        <td>
                            <select class="role-select" id="role-${acc.id}">
                                <option value="user" ${acc.role === 'user' ? 'selected' : ''}>User</option>
                                <option value="volunteer" ${acc.role === 'volunteer' ? 'selected' : ''}>Volunteer</option>
                                <option value="admin" ${acc.role === 'admin' ? 'selected' : ''}>Admin</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn-save-role" onclick="updateRole(${acc.id})">Save Role</button>
                        </td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Failed to load accounts.</td></tr>`;
        }
    }

    async function updateRole(id) {
        const newRole = document.getElementById(`role-${id}`).value;
        try {
            const response = await fetch('/api/accounts/role', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ id, role: newRole })
            });
            if (response.ok) {
                alert('Role updated successfully!');
            } else {
                alert('Failed to update role.');
            }
        } catch (err) {
            alert('Network error.');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Initialization
    loadTasks();
  </script>

</body>
</html>
